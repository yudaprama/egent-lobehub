name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Determine version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="v0.0.${GITHUB_RUN_NUMBER}-$(echo "${GITHUB_SHA::7}")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          BINARY="egent-lobehub-${{ matrix.goos }}-${{ matrix.goarch }}"
          LDFLAGS="-s -w -X main.version=${{ steps.ver.outputs.version }}"
          go build -trimpath -ldflags "$LDFLAGS" -o "dist/$BINARY" .

          # Package as tarball (preserve exec bit + portability)
          tar -czf "dist/$BINARY.tar.gz" -C dist "$BINARY"
          sha256sum "dist/$BINARY.tar.gz" > "dist/$BINARY.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: egent-lobehub-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 30

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            IS_TAG=true
          else
            VERSION="v0.0.${GITHUB_RUN_NUMBER}"
            IS_TAG=false
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_tag=$IS_TAG" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: Release ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.ver.outputs.is_tag != 'true' }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
