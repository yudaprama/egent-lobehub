name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build all targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Determine version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="v0.0.${GITHUB_RUN_NUMBER}-$(echo "${GITHUB_SHA::7}")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Run tests
        run: make test

      - name: Build all targets
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: make build-all VERSION="$VERSION"

      - name: Pack source archive
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          git archive --format=tar.gz \
            --prefix="egent-lobehub-${VERSION}/" \
            -o "dist/egent-lobehub-source-${VERSION}.tar.gz" \
            HEAD
          # Expose main.go as a single downloadable file (convenience for tooling)
          git show HEAD:main.go > "dist/main.go"
          sha256sum "dist/egent-lobehub-source-${VERSION}.tar.gz" \
            > "dist/egent-lobehub-source-${VERSION}.tar.gz.sha256"
          sha256sum "dist/main.go" > "dist/main.go.sha256"
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: egent-lobehub-binaries
          path: |
            dist/*.tar.gz
            dist/*.sha256
            dist/main.go
          retention-days: 30

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          # SemVer pre-release detection: any dash after vX.Y.Z (e.g. v0.0.3-rc1, v0.0.3-pre.1)
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (prerelease=$IS_PRERELEASE)"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: Release ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.ver.outputs.is_prerelease == 'true' }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/main.go
